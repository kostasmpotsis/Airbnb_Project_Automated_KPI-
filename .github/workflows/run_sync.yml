name: Airbnb_Project_Automated_KPI

on:
  schedule:
    # Τρέχει κάθε 3 μέρες στις 06:00 UTC (8:00 Ελλάδα)
    - cron: '0 6 1 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Διορθώνει το Node.js warning

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            "snowflake-connector-python[pandas]" \
            beautifulsoup4 \
            lxml \
            pandas \
            openpyxl

      - name: Write credentials from secrets
        run: |
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      # Ελέγχει ότι το token.json δεν είναι κενό πριν τρέξει το script
      - name: Validate token.json
        run: |
          if [ ! -s token.json ]; then
            echo "❌ ERROR: token.json is empty! Check the GMAIL_TOKEN_JSON secret."
            exit 1
          fi
          python3 -c "import json; json.load(open('token.json'))" && echo "✅ token.json is valid JSON" || (echo "❌ token.json is not valid JSON"; exit 1)

      - name: Run sync script
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python airbnb_sync.py
