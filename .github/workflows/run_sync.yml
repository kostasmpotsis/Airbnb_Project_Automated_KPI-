name:Airbnb_Project_Automated_KPI-

on:
  schedule:
    # Τρέχει κάθε 3 μέρες στις 06:00 UTC (8:00 Ελλάδα)
    - cron: '0 6 */3 * *'
  workflow_dispatch:  # Επιτρέπει και χειροκίνητη εκτέλεση από το GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            snowflake-connector-python \
            beautifulsoup4 \
            lxml \
            pandas \
            openpyxl

      # Γράφει τα secrets στο filesystem ώστε ο Python κώδικας να τα βρει
      - name: Write credentials from secrets
        run: |
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Run sync script
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python airbnb_sync.py
